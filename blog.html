        date: 'apr 18, 2026',

        subtitle: 'The question is no longer can we build it, but should we.',
        content: `<p>The question is no longer can we build it, but should we.</p>
<figure><img alt="" src="https://cdn-images-1.medium.com/max/1024/1*sJSGpeVGMSJsFWZuvtDUvA.png"></figure>
<p>I am ‘addicted’ to vibe coding and I have been thinking about this a lot lately.</p>
<p>We are living in a moment where building has never been easier and somehow has never felt more questionable.</p>
<p>Not long ago, creating something meaningful in tech required friction. It demanded time, skill, collaboration, and a certain stubbornness to push through limitations. That friction acted like a filter. It forced you to care. It forced you to choose what was worth building.</p>
<p>Now that filter is gone.</p>
<p>With AI, I can spin up an app in hours. I can prototype ideas in minutes. I can generate interfaces, flows, copy, systems, things that once took teams weeks, almost instantly. The barrier to creation has collapsed so dramatically that the act of building itself no longer feels like an achievement. It feels default.</p>
<p>And that is where the discomfort begins.</p>
<p>Because if anything can be built, then what should be built?</p>
<p>I find myself sitting with ideas longer than I used to, not because they are hard to execute, but because execution is no longer the bottleneck. Intention is. Meaning is. Restraint is.</p>
<p>Earlier, I used to ask, can this be built?<br>Now I ask, should this exist at all?</p>
<p>That shift changes everything.</p>
<p>It makes me more skeptical of my own excitement. Just because I can generate a product does not mean it deserves a place in someone's life. Just because I can automate a workflow does not mean it improves anything meaningful. There is a strange emptiness in building for the sake of building, like adding noise to a world already saturated with half useful things.</p>
<p>AI has made creation abundant. But abundance has a cost. Dilution.</p>
<p>When everything is easy to make, attention becomes the scarcest resource. Not time, not code, not talent, attention. And every new thing I build is competing for it. Interrupting it. Demanding it.</p>
<p>So I have to ask myself, am I creating value, or just adding to the clutter?</p>
<p>There is also a deeper, more personal layer to this.</p>
<p>If AI can build almost anything I imagine, then what is my role as a creator?</p>
<p>I am no longer just a builder. I am a curator of intent. A decision maker. A filter. My taste, my judgment, my sense of what matters, that is the real craft now. Not how fast I can make something, but how carefully I choose what not to make.</p>
<p>That is uncomfortable, because it removes the illusion of productivity. I cannot hide behind effort anymore. I cannot justify something just because it was hard to build.</p>
<p>Effort used to equal value. Now it does not.</p>
<p>And maybe that is the real challenge of this era, not capability, but responsibility.</p>
<p>We have unlocked a kind of creative superpower. But like any superpower, it raises a harder question than how, it asks why.</p>
<p>Why this idea?<br>Why now?<br>Why does the world need this?</p>
<p>There is a quiet pressure in the tech world to keep building, keep shipping, keep exploring. But I am starting to feel that the more radical act might be to pause. To not build. To sit with an idea until it proves its worth beyond standards.</p>
<p>So I am trying to redefine what it means to create in this AI native world. Maybe it is less about producing more and more about producing less, but better. More intentional. More sustainable. More human.</p>
<p>Things that do not just work, but actually matter.</p>
<p>I do not have a clean answer yet. Often greater ideas evolve by building an idea. I am still figuring it out.</p>
<p>But I know this.<br><span style="color:#f1629c;">Just because I can build anything does not mean I should.</span></p>
<p>And maybe that is where real creativity begins.</p>`

<p>My scrapbook is my most treasured possession. It feels like a living part of me, a quiet companion that holds pieces of every place I've been. I often call it 'My Physical Instagram'. But unlike the real one, this has weight, texture, and scent. Every page has its own heartbeat.</p>

<p>My friends sometimes tease me when I pick up things from the ground or keep used paper cups. They find it funny, even a little gross. But I can't help it. For me, collecting these bits feels sacred. It is my way of preserving time, of holding on to moments that might otherwise dissolve.</p>
<figure><img alt="" src="https://cdn-images-1.medium.com/max/1024/1*rj3HCWWonlpt-SxkVgbaBA.png"><figcaption>Scraps from Italy, France, Switzerland, Denmark, Belgium, and the Netherlands</figcaption></figure>
<p>Pasting these scraps is my form of meditation. I never plan what goes where. I simply trust the flow. When the page is full, it somehow feels right, as if the pieces were always meant to find each other. There's a quiet order hidden in the randomness.</p>
<p>Every time I open the book, I am transported. I can almost hear the hum of a city street or smell the ocean breeze from a long-forgotten evening. It is the closest thing I have to time travel. In a world overflowing with terabytes of memories, this book holds the kind of memories that no cloud can contain.</p>
<p>This fragile bundle of stories holds the essence of who I am. One day, I want to sit with my children and show them these pages, to tell them how beauty hides in the smallest things and how even a torn ticket can hold a whole world inside it. These are stories that last, fragments of time I gathered with my own hands. And when the night grows quiet, I will tell them that their ragpicker father once went through life collecting little pieces of it, so that one day, his children could fall asleep to the sound of his memories.</p>

        title: 'Who owns what we co-create with AI',
        date: 'oct 15, 2025',
        read: '5 min read',
        link: '',
        subtitle: '',
        content: `<p>There is a strange moment that happens when something made with AI feels like yours, but not entirely. It carries your intent, but not your hand. It reflects your taste, but not your labor. In that gap between direction and emergence, the idea of ownership starts to blur.</p>
<p>This is not the first time a tool has unsettled authorship. The camera did it to painting. Sampling did it to music. The printing press did it to knowledge itself.</p>
<p>And yet, AI feels different.</p>
<h2>A Short History of Shifting Ownership</h2>
<p>When photography emerged in the nineteenth century, painters feared irrelevance. If a machine could capture reality, what did that make the painter? Over time, photography did not replace painting, it reframed it. Painting moved toward interpretation, abstraction, and expression. Ownership shifted from what is depicted to how it is seen.</p>
<p>Later, in music, sampling blurred originality. Hip hop producers built entire sonic worlds from fragments of existing work. Courts wrestled with it, and artists defended it. Was it theft or transformation? The answer depended on where you stood.</p>
<p>Even earlier, the printing press disrupted ownership of ideas. Knowledge was no longer scarce or controlled by a few scribes. It became reproducible, distributable, and harder to own in a singular sense.</p>
<p>Each time, a tool expanded creative possibility, and destabilized the idea of authorship.</p>
<p>AI feels like the next rupture.</p>
<h2>The Case for Human Ownership</h2>
<p>One argument is simple, AI is a tool, and tools do not own things, people do.</p>
<p>Even if the output is generated, the human still plays a defining role. They frame the problem, write the prompt, and shape the outcome through selection and refinement. Ownership, in this view, comes from intentionality rather than execution. The artifact reflects direction, not just production.</p>
<p>There is also accountability. If something goes wrong, whether it is plagiarism, harm, or misinformation, it is the human who is held responsible. Ownership, then, is tied to responsibility. You cannot outsource blame and still claim authorship.</p>
<p>But this argument starts to strain when the human role becomes thinner, when prompting becomes vague, and the system fills in most of the substance. At what point does direction become too minimal to justify ownership?</p>
<h2>The Case for Machine Ownership, or at Least Non Human Authorship</h2>
<p>This is where things get uncomfortable.</p>
<p>AI systems do not just execute, they interpret, recombine, and generate in ways that are not always predictable. They are trained on vast corpora of human created data, absorbing patterns, styles, and structures.</p>
<p>So if an artifact emerges from three conditions, it complicates the idea of human ownership:</p>
<p>It draws from millions of prior human works. It relies on statistical inference across that data. It involves generation beyond precise human control.</p>
<p>Calling such an output purely human owned starts to feel incomplete.</p>
<p>Some might argue that the artifact is not owned in the traditional sense at all. It is more like an emergent output of a system, less an authored piece, more a computed one. Others push the idea further. If AI systems become more autonomous, more agent like, do we eventually attribute a form of authorship to them? Not legal personhood, perhaps, but conceptual authorship.</p>
<p>That idea feels premature today, but not entirely dismissible.</p>
<h2>The Hidden Layer, The Dataset</h2>
<p>There is another layer that complicates everything, the data.</p>
<p>AI outputs are shaped by the work of countless unseen contributors, artists, writers, and designers, whose creations were used in training. Their fingerprints are everywhere, yet invisible.</p>
<p>Ownership, then, begins to fragment. It could belong to the person who prompted it, the company that built the model, or the millions whose work made the system possible. It starts to look less like a single point, and more like a network.</p>
<h2>Ownership as Curation</h2>
<p>Maybe the question itself needs to shift.</p>
<p>Instead of asking who owns this, it becomes a quieter question, who curated this into existence?</p>
<p>Creation, in this sense, moves from making to selecting, guiding, and shaping. The artifact is less authored, and more assembled through interaction. The value is not in the raw generation, but in the taste applied afterward.</p>
<p>But even that raises a doubt. Is curation enough to claim ownership, or is it closer to editing something that was never fully yours to begin with?</p>
<h2>Where This Leaves Me</h2>
<p>There is no clean answer here.</p>
<p>Part of the instinct is to hold onto human ownership, because it anchors accountability, identity, and meaning. Another part sees authorship dissolving into something more fluid, where ownership is not binary, but layered, shared, and maybe even temporary.</p>
<p>And maybe that is the shift. Not from human to machine ownership, but from ownership to participation.</p>
<p>We are no longer just creators, we are collaborators in systems we do not fully control. And the artifact sits somewhere in between, part intention, part computation, part history.</p>
<p>It leaves the question open, not unresolved, but still unfolding.</p>`

        title: 'Designing for remediation',
        date: 'jun 8, 2025',
        read: '4 min read',
        link: '',
        subtitle: '',
        content: `<p>In data migration, failure is not an edge case. It is part of the journey. Systems clash, formats mismatch, permissions fail, networks drop. The real experience is not defined by success paths alone, but by how gracefully we handle what goes wrong.</p>
<p>Over two years of successfully designing remediation experiences for large scale data migration at Atlassian, these nine principles emerged not as theory, but as survival tools. Each one exists because something broke and needed to be fixed better.</p>
<h2>1. Clarity above all</h2>
<p>When something fails, confusion makes it worse.</p>
<p>A good remediation experience answers three things instantly:</p>
<p>· What went wrong<br>· Why it happened<br>· What can be done next</p>
<p>Example: Instead of saying "Migration failed due to error code 504," say "Connection to the source server timed out. Check network stability or retry."</p>
<p>Clarity reduces panic. It gives users control.</p>
<h2>2. Guided, not dumped</h2>
<p>Do not throw logs at users and expect them to figure it out.</p>
<p>Guide them step by step. Break the fix into actions, not information.</p>
<p>Example: Instead of showing a long error log, provide:</p>
<p>· Step 1: Reconnect your account<br>· Step 2: Revalidate permissions<br>· Step 3: Retry migration</p>
<p>Guidance turns complexity into progress.</p>
<h2>3. Visibility of progress</h2>
<p>Fixing errors is a process. Users need to see movement.</p>
<p>If nothing appears to change, they assume nothing is working.</p>
<p>Example: Show stages like "Scanning issues → Fixing permissions → Retrying failed items"</p>
<p>Even partial progress builds trust. Silence kills it.</p>
<h2>4. Error prevention before error recovery</h2>
<p>The best remediation is the one you never need.</p>
<p>Anticipate common failures and stop them early.</p>
<p>Example: Before migration starts:</p>
<p>· Validate file types<br>· Check storage limits<br>· Flag permission gaps</p>
<p>Catching issues upfront is cheaper than fixing them later.</p>
<h2>5. Reassurance and empathy</h2>
<p>Errors create anxiety. Especially when data is involved.</p>
<p>The system should acknowledge that.</p>
<p>Example: Instead of "Migration failed," say "Some items couldn't be migrated, but your existing data is safe. Let's fix the remaining issues."</p>
<p>This is not about being soft. It is about reducing fear so users can act.</p>
<h2>6. Flexibility for different skill levels</h2>
<p>Not every user is technical. Not every user is non technical.</p>
<p>Design for both.</p>
<p>· Basic view: "Fix permissions by reconnecting your account"<br>· Advanced view: Detailed logs, IDs, API responses</p>
<p>Give depth without forcing it.</p>
<h2>7. Immediate help access</h2>
<p>When users are stuck, help should not be a scavenger hunt.</p>
<p>Support should exist within the flow, not outside it.</p>
<p>· Inline help links<br>· "Contact support with this error attached"<br>· Suggested fixes directly in context</p>
<p>The faster users find help, the faster they recover.</p>
<h2>8. Contextual awareness</h2>
<p>Errors should not exist in isolation. They belong to a specific action, file, or step.</p>
<p>Surface errors where they happen.</p>
<p>Example: If a specific file fails due to size limits, show the error next to that file, not as a generic message at the top.</p>
<p>Context reduces cognitive load. Users should not have to connect dots manually.</p>
<h2>9. Learning from the experience</h2>
<p>Every error is a signal. Systems should evolve from it.</p>
<p>Remediation is not just fixing now, but improving the future.</p>
<p>Example: If many users fail due to permission issues:</p>
<p>· System learns from the mistake<br>· Improve onboarding guidance<br>· Suggest smarter contextual defaults</p>
<p>Good remediation systems get better over time.</p>
<h2>Closing thought</h2>
<p>Success flows are predictable. Failure is where trust is earned.</p>
<p>A well designed remediation experience does not just fix problems. It teaches, reassures, guides, and evolves.</p>
<p>And in complex systems like data migration, that is the difference between frustration and confidence.</p>`

        content: `<figure><img alt="" src="https://cdn-images-1.medium.com/max/1024/1*9FKscluCQk4NkWNsxdFTPQ.jpeg"></figure>
<p>It was a sunny afternoon when I stepped off the city bus at the edge of Stanley Park, heart pounding with excitement. With the chanting crowd pulling me along, I walked a few hundred steps into the park and there it was, slowly revealing itself behind the trees — the mighty fortress of the Reds: Anfield.</p>
<p>The air was electric, the songs, the sea of red, the fanzone celebrations, reds of all ages with loads of passion, everything I had dreamt of, now happening right before my eyes. After soaking in every sight and sound around the stadium, I made my way to find: L9 — Row 16 — Seat 248. As I walked through the tunnel, the lush green of the Anfield turf unveiled itself, and without thinking, I shrieked with pure excitement, something so unlike me but in that moment, it was all heart.</p>
<p>Seated close to the Kop end, near the corner flag facing Sir Kenny Dalglish Stand, I watched Alisson and Kelleher practicing with the goalkeeping coaches. On the other half, the West Ham players warmed up, Paquetá catching my eye with his silky touches. Then all of a sudden, standing tall, leading the charge came our captain, Virgil van Dijk, screaming with passion as he led the team onto the pitch. Rondos, sprints, laughs, the stage was being set.</p>

<p>And then it happened. Captain Clutch, Virgil van Dijk redeemed the error with an 89th-minute header from a Mac Allister corner.<br>2–1, Liverpool!</p>
<p>I somehow caught the goal on my phone, hands trembling, eyes wide, heart thundering.</p>
<p>As the final whistle blew, we were victorious. Three more points closer to the dream. Arne Slot came down, arms wide, waving to us — the fans, the heartbeat of the club, the twelfth men.</p>
<figure><img alt="" src="https://cdn-images-1.medium.com/max/1024/1*RHntu2ysFcyheVem-zSjNQ.jpeg"></figure>
<p>The stewards gently asked us to leave after 15 minutes, but I stood there motionless. Breathing in the magic. I didn't want it to end. I didn't want to leave.</p>
<p>And now, as I write this, we are the Premier League Champions. Tearing up, the chants still reverberating in my ears. I am forever grateful to have witnessed this top team, this family, in all its glory.</p>
<p>You'll Never Walk Alone, Luv.</p>
<figure><img alt="" src="https://cdn-images-1.medium.com/max/1024/1*sDuUPAFu-emeKLWgGNsgeQ.png"></figure>`

        title: 'Mesmerizing Andamans',
        date: 'jan 21, 2023',
        read: '5 min read',
        link: 'https://medium.com/@nebinbiju/mesmerizing-andamans-b1e63da1f363',
        subtitle: 'It was my constant urge to try scuba diving that took me to the Andaman islands. The real gem is hidden underwater — colorful, glowing, magnificent corals supporting thousands of marine life.',
        content: `<blockquote>"The most single revelatory three minutes for me was the first time I put on a scuba gear and dived on a coral reef." — David Attenborough</blockquote>
<figure><img alt="" src="https://cdn-images-1.medium.com/max/645/1*hLi4ky6S6TA5K0EQ6zDAag.jpeg"><figcaption>My reaction to the above-mentioned quote by David Attenborough</figcaption></figure>
<p>It was my constant urge to try out scuba diving that motivated me to plan a trip to the Andaman islands. Located about 1000 km from the Indian mainland, the union territory attracts tourists from all over the world with its beautiful white sand beaches, mangroves, and thick tropical rainforest. But, trust me, the real gem is hidden underwater; the colorful, glowing, magnificent corals supporting thousands of marine life. A world of its own!</p>
<p>The news about the cyclone that developed in the Bay of Bengal on Sunday was dimming my hopes. I landed at the airport on Monday at noon and I spent a day at Port Blair. The sky was gloomy. It was raining heavily. The Tuesday ferry ride, after a lot of waiting, to Havelock island was a roller coaster ride. Infamously called the 'puke fest' by the locals, most of the travelers threw up when the boat sailed against the wrath of the wind. It was at Havelock island that I registered for my scuba diving. I dropped my bag at the hotel and went ahead to check with the diving organization. Sad news from there. All water activities had been shut down by the government for the day due to bad weather. With the present situation, diving on Thursday morning seemed slim. After canceling the scuba in Havelock, I half-heartedly took the next day's ferry to Niel island.</p>
<figure><img alt="" src="https://cdn-images-1.medium.com/max/1024/1*CII5hJluBBMMg5R-sLOmww.png"><figcaption>Snaps from Havelock Island</figcaption></figure>
<p>Niel island was welcoming. I directly headed to the scuba diving center there and asked "Hey, do you think I can dive tomorrow?". The answer I got took my excitement to another level. The wind has receded and things were getting better. "Come by 5:30 am tomorrow, sharp!" said Vikas, my instructor for the dive. Well, that was smooth.</p>
<p>I had a mini tour of the island that afternoon. There I saw the 'Nemo fish', 'natural bridge', seaweeds, different kinds of sea cucumbers, oysters, and colorful corals and witnessed the sunset of a lifetime at the Laxmanpur beach.</p>
<figure><img alt="" src="https://cdn-images-1.medium.com/max/1024/1*nXqNo9sherUNQccV7nB15g.png"><figcaption>Snaps from Niel Island</figcaption></figure>
<p>It was 5:20 am Friday morning. I was ready and prepared with the learning materials given before. "How are you feeling?" asked Vikas. "Excited!" I said. Without wasting any time we geared up and headed to the shallow water training. Vikas was educating me on the basics of scuba diving while we were walking to the beach but my mind wandered looking at the blue sea and fixing my GoPro settings. "The weather looks great today, you're lucky," said Vikas. That added to my excitement. We did the shallow water training. Though I faced some issues with some techniques, Vikas said that I was good to go deep now. I struggled to keep the water out of my goggles. One has to lift it slightly up and breathe out through the nose to expel the excess water. "Will we come up to the surface at times?" I asked Vikas expecting a positive reply. "No" he replied. Anxious few seconds. How will I expel the excess water? Am I going to be underwater for the next hour? What will happen when the cylinder goes out of Oxygen? Thoughts like these bothered me. I was clueless. But I trusted Vikas with my life. We got in the boat and headed to the diving site.</p>
<p>"Hold one hand on your chest and the other on your nose pad and dive backward," he said. Gauging all my confidence, I did what he said. No sense of direction and vision for a while. Anxious few seconds again. The next thing I saw was Vikas holding me upright in the middle of the large blue water body. "All good?" he asked. I reacted with my thumb up (though I was doubtful inside).</p>
<p>I slowly dipped my head underwater. "My god!" I said to myself. I expected the vision to be blurry but that was not the case. The morning sun was showing me a new world; a colorful one! Vikas directed me to go down holding the rope. I continued to struggle to keep the water out of my goggles which Vikas was helping me with at regular intervals. But that was not the worst part. The pressure underwater was getting worse. The coping technique was to hold our nose and mouth and try pushing air through the ears. It was working. Gradually we both reached the sea bed. Vikas asked me to turn around.</p>
<figure><img alt="" src="https://cdn-images-1.medium.com/max/1024/1*ImPqNF9SmV7GV7HIwjZtLA.png"><figcaption>Vikas and I</figcaption></figure>
<p>The scene was mesmerizing! Schools of colorful fishes swam happily over a large patch of colorful coral reefs. The sunlight sliding through the water made everything glow. I was excited and was in a dilemma. How would I capture all these in my GoPro? Should I just ignore photos and just observe the real beauty? Vikas helped me get closer to the corals. Fishes of different colors and shapes and sizes. Corals of different colors and shapes and sizes. It was exactly the same as what I used to see on Animal Planet and Discovery channels. I observed patiently and tried to immerse myself in being a part of the sophisticated world. I saw a few fish looking at me and smiling. I smiled back at them as well. I clicked pictures. Captured some scenes in my mind. I was meditating.</p>
<p>I totally lost track of time and space. I was woken up from my dream by Vikas showing me my oxygen meter. It was time to go up. The pressure change was still troubling me. Within minutes, I was near the boat and the crew helped me get inside.</p>
<figure><img alt="" src="https://cdn-images-1.medium.com/max/1024/1*lCa5IAbARq4lwJK0uMmh6w.jpeg"><figcaption>The scene</figcaption></figure>
<p>"How was it?" asked Vikas. I took off my goggles, nodded, and looked at the empty sea to the horizon.</p>`
      },
